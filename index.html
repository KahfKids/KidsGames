  <script>
    // Disable right click
    document.addEventListener('contextmenu', (e) => e.preventDefault());

    // Disable inspect element
    document.addEventListener('keydown', function (e) {
      // Disable F12
      if (e.keyCode == 123) {
        e.preventDefault();
      }
      // Disable Ctrl+Shift+I
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) {
        e.preventDefault();
      }
      // Disable Ctrl+Shift+J
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) {
        e.preventDefault();
      }
      // Disable Ctrl+U (View Source)
      if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) {
        e.preventDefault();
      }
    });

    function getQueryParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

    function applyThemeColors() {
      const brightness = getQueryParam("brightness") || "Light";
      const theme = getQueryParam("theme") || "Normal";
      const hideHeader = getQueryParam("hideHeader") || "false";
      const isWeb = getQueryParam("isWeb") || "true";
      const isPremiumPurchased = getQueryParam("isPremiumPurchased") || "false";

      // // Handle premium games display
      // const gameLinks = document.querySelectorAll('.game-link');
      // gameLinks.forEach(link => {
      //   const gameTitle = link.querySelector('.game-title').textContent;
      //   const allowedGames = ['Math Challenge', 'Shape Pattern', 'Kids Maze Adventure', 'Islamic Shapes', 'Islamic Good Deeds', 'Baloon Pop', 'Animal Memory Match'];

      //   // Check if it's a premium game
      //   if (link.href.includes('premium-games')) {
      //     const gameCard = link.querySelector('.game-card');
      //     if (isPremiumPurchased === "false") {
      //       gameCard.classList.add('premium-locked');
      //     } else {
      //       gameCard.classList.remove('premium-locked');
      //     }
      //     gameCard.classList.add('premium-game');
      //   }

      //   // Hide premium games if not web
      //   if (isWeb === "true" && allowedGames.includes(gameTitle)) {
      //     link.style.display = 'none';
      //   }
      // });

      let bgColor = "#F7F5FF";
      let heroTailBg = "#F7F5FF";
      let contentBg = "#F7F5FF";
      let textColor = "#10213D";
      let cardBg = "#F0EDFF";
      let cardBorder = "rgba(255, 255, 255, 0.92)";
      let cardShadow = "0 8px 18px rgba(83, 59, 168, 0.14)";
      let cardShadowHover = "0 14px 28px rgba(83, 59, 168, 0.2)";
      let titleOverlay = "linear-gradient(180deg, rgba(16, 33, 61, 0) 0%, rgba(16, 33, 61, 0.72) 100%)";
      let iconBg = "rgba(255, 255, 255, 0.7)";
      let accentColor = "#5A63D8";
      let contentShadow = "0 -14px 32px rgba(83, 59, 168, 0.14)";
      let bottomPadding = "24px";
      let contentBottomPadding = "24px";
      if (brightness === "Dark") {
        if (theme === "Normal") {
          bgColor = "#080020";
          heroTailBg = "#080020";
          contentBg = "#080020";
          textColor = "#ffffff";
          cardBg = "#19182A";
          cardBorder = "rgba(255, 255, 255, 0.1)";
          cardShadow = "0 8px 18px rgba(0, 0, 0, 0.36)";
          cardShadowHover = "0 14px 30px rgba(0, 0, 0, 0.48)";
          contentShadow = "0 -14px 32px rgba(0, 0, 0, 0.34)";
          titleOverlay = "linear-gradient(180deg, rgba(8, 0, 32, 0) 0%, rgba(8, 0, 32, 0.82) 100%)";
          iconBg = "rgba(255, 255, 255, 0.08)";
          accentColor = "#6A60DA";
        } else if (theme === "Youtube") {
          bgColor = "#0F0F0F";
          heroTailBg = "#0F0F0F";
          contentBg = "#0F0F0F";
          textColor = "#ffffff";
          cardBg = "#272727";
          cardBorder = "rgba(255, 255, 255, 0.12)";
          cardShadow = "0 8px 18px rgba(0, 0, 0, 0.36)";
          cardShadowHover = "0 14px 30px rgba(0, 0, 0, 0.48)";
          contentShadow = "none";
          titleOverlay = "linear-gradient(180deg, rgba(15, 15, 15, 0) 0%, rgba(15, 15, 15, 0.82) 100%)";
          iconBg = "rgba(255, 255, 255, 0.08)";
          accentColor = "#FFFFFF";
          bottomPadding = "0px";
          contentBottomPadding = "200px";
        }
      } else if (brightness === "Light") {
        if (theme === "Youtube") {
          bgColor = "#FFFFFF";
          heroTailBg = "#FFFFFF";
          contentBg = "#FFFFFF";
          textColor = "#0F0F0F";
          cardBg = "#F1F1F1";
          cardBorder = "rgba(0, 0, 0, 0.1)";
          iconBg = "rgba(0, 0, 0, 0.05)";
          accentColor = "#030303";
          contentShadow = "none";
          bottomPadding = "0px";
          contentBottomPadding = "200px";
        }
      }

      if (hideHeader === "true") {
        document.querySelector(".header").style.display = "none";
        contentShadow = "none";
      }

      const root = document.documentElement;
      root.style.setProperty("--main-bg", bgColor);
      root.style.setProperty("--hero-tail-bg", heroTailBg);
      root.style.setProperty("--content-bg", contentBg);
      root.style.setProperty("--text-color", textColor);
      root.style.setProperty("--card-bg", cardBg);
      root.style.setProperty("--card-border", cardBorder);
      root.style.setProperty("--card-shadow", cardShadow);
      root.style.setProperty("--card-shadow-hover", cardShadowHover);
      root.style.setProperty("--title-overlay", titleOverlay);
      root.style.setProperty("--icon-bg", iconBg);
      root.style.setProperty("--accent-color", accentColor);
      root.style.setProperty("--content-shadow", contentShadow);
      document.documentElement.style.setProperty(
        "--bottom-padding",
        bottomPadding
      );
      document.documentElement.style.setProperty(
        "--content-bottom-padding",
        contentBottomPadding
      );
      document
        .querySelector('meta[name="theme-color"]')
        ?.setAttribute("content", bgColor);
    }

    window.addEventListener("load", applyThemeColors);

    // PWA Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/KidsGames/sw.js')
          .then(registration => {
            console.log('[PWA] Service Worker registered successfully:', registration.scope);

            // Check for service worker updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New content is available
                  if (confirm('New version available! Reload to update?')) {
                    window.location.reload();
                  }
                }
              });
            });
          })
          .catch(error => {
            console.log('[PWA] Service Worker registration failed:', error);
          });
      });
    }


    // Offline indicator
    function updateOnlineStatus() {
      const offlineIndicator = document.getElementById('offline-indicator');
      if (!navigator.onLine) {
        if (!offlineIndicator) {
          const indicator = document.createElement('div');
          indicator.id = 'offline-indicator';
          indicator.textContent = '📵 Offline - Some features may be limited';
          indicator.style.cssText = `
              position: fixed;
              top: 0;
              left: 0;
              right: 0;
              background: #F3494D;
              color: white;
              text-align: center;
              padding: 8px;
              font-weight: bold;
              z-index: 9999;
              font-size: 14px;
            `;
          document.body.appendChild(indicator);
        }
      } else {
        if (offlineIndicator) {
          offlineIndicator.remove();
        }
      }
    }

    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

  <style>
    :root {
      --main-bg: #F7F5FF;
      --hero-tail-bg: #F7F5FF;
      --content-bg: #F7F5FF;
      --text-color: #10213D;
      --card-bg: #F0EDFF;
      --card-border: rgba(255, 255, 255, 0.92);
      --card-shadow: 0 8px 18px rgba(83, 59, 168, 0.14);
      --card-shadow-hover: 0 14px 28px rgba(83, 59, 168, 0.2);
      --title-overlay: linear-gradient(180deg, rgba(16, 33, 61, 0) 0%, rgba(16, 33, 61, 0.72) 100%);
      --icon-bg: rgba(255, 255, 255, 0.7);
      --accent-color: #5A63D8;
      --content-shadow: 0 -14px 32px rgba(83, 59, 168, 0.14);
      --bottom-padding: 24px;
      --content-bottom-padding: 24px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        sans-serif;
    }

    body {
      background: var(--main-bg);
      color: var(--text-color);
    }

    .app-container {
      width: 100%;
      min-height: 100vh;
      background: linear-gradient(180deg, var(--main-bg) 0%, var(--hero-tail-bg) 42%, var(--content-bg) 100%);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 24px 20px;
      background: transparent;
      top: 0;
    }

    .title-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .game-icon {
      width: 24px;
      height: 24px;
      filter: drop-shadow(0 2px 4px rgba(83, 53, 180, 0.24));
    }

    .header h1 {
      font-size: 24px;
      color: var(--text-color);
      font-weight: 800;
    }

    .search-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--icon-bg);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .search-icon {
      color: var(--accent-color);
      width: 20px;
      height: 20px;
    }

    .content-container {
      background: var(--content-bg);
      border-top-left-radius: 32px;
      border-top-right-radius: 32px;
      padding-top: var(--bottom-padding);
      padding-bottom: var(--content-bottom-padding);
      padding-left: 0;
      padding-right: 0;
      min-height: calc(100vh - 72px);
      box-shadow: var(--content-shadow);
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
      gap: 16px;
      padding: 0 24px 24px 24px;
      width: 100%;
    }

    .game-link {
      text-decoration: none;
      color: inherit;
      display: block;
      transform: translateY(0);
      transition: transform 0.2s ease;
      width: 100%;
    }

    .game-link:hover {
      transform: translateY(-4px);
    }

    .game-link:active {
      transform: translateY(0);
    }

    .game-card {
      aspect-ratio: 1;
      border-radius: 20px;
      border: 1px solid var(--card-border);
      overflow: hidden;
      position: relative;
      background: var(--card-bg);
      box-shadow: var(--card-shadow);
      transition: box-shadow 0.2s ease;
      width: 100%;
    }

    .game-link:hover .game-card {
      box-shadow: var(--card-shadow-hover);
    }

    .game-link:active .game-card {
      box-shadow: var(--card-shadow);
    }

    .game-thumbnail {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .game-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--title-overlay);
      pointer-events: none;
    }

    .game-title {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: left;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 13px;
      color: white;
      padding: 16px;
      z-index: 2;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.48);
    }

    .premium-locked {
      position: relative;
    }

    .premium-locked::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 2;
      pointer-events: none;
    }

    .premium-game::before {
      content: "👑";
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 20px;
      z-index: 3;
      animation: blink 1.5s infinite;
      pointer-events: none;
    }

    @keyframes blink {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }

      100% {
        opacity: 1;
      }
    }

    /* Responsive breakpoints */
    @media (min-width: 700px) {
      .game-icon {
        width: 32px;
        height: 32px;
      }

      .header h1 {
        font-size: 32px;
      }

      .header {
        background: transparent;
      }

      .content-container {
        border-top-left-radius: 34px;
        border-top-right-radius: 34px;
      }

      .games-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 24px;
      }
    }

    @media (min-width: 1024px) {
      .games-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 32px;
        padding: 0 32px 32px 32px;
      }

      .header {
        padding: 16px 32px;
      }
    }

    @media (max-width: 380px) {
      .games-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 0 12px 24px 12px;
      }

      .header {
        padding: 16px 12px;
      }

      .game-title {
        font-size: 12px;
        padding: 12px;
      }
    }
  </style>
</head>
